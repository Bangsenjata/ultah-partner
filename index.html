<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have something for you... 🎁</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Welcome splash screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-envelope">👀</div>
            <h2 class="splash-title">Psst... hey you</h2>
            <p class="splash-subtitle">Someone left you a little something</p>
            <button id="splash-btn" class="splash-btn">Come in ✨</button>
        </div>
    </div>

    <div class="floating-bg"></div>

    <div class="container" style="display: none;" id="main-content">
        <h1>Guess what day it is...? 🎂</h1>

        <div class="gif-container">
            <img id="cute-gif" src="https://media.tenor.com/EBV7OT7ACfwAAAAj/u-u-qua-qua-u-quaa.gif" alt="cute character">
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Open it! 🎉</button>
            <button id="no-btn" onclick="handleNoClick()">Nah, maybe later</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music" style="display: none;">🔊</button>

    <script src="script.js"></script>
    <script src="particles.js"></script>
</body>
</html>
